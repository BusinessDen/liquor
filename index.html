<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquor License Tracker — Dreck Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #08090a;
    --surface: #0d0e12;
    --surface2: #131519;
    --surface3: #1a1c22;
    --border: #23262e;
    --text: #e2e4e9;
    --text-dim: #8b8f9a;
    --text-muted: #555963;
    --blue: #3b82f6;
    --amber: #f5a623;
    --green: #22c55e;
    --red: #ef4444;
    --gray: #6b7280;
    --dark-gray: #374151;
    --pink: #ec4899;
    --radius: 10px;
    --font: 'Outfit', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ---- Auth ---- */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #auth-overlay.hidden { display: none; }
  #auth-overlay h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  #auth-overlay input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 16px; border-radius: var(--radius);
    font-family: var(--font); font-size: 15px; width: 260px; outline: none;
  }
  #auth-overlay input:focus { border-color: var(--blue); }
  #auth-overlay .error { color: var(--red); font-size: 13px; min-height: 20px; }
  #auth-overlay button {
    background: var(--blue); color: #fff; border: none; padding: 10px 24px;
    border-radius: var(--radius); font-family: var(--font); font-size: 15px;
    cursor: pointer; font-weight: 500;
  }

  /* ---- Layout ---- */
  #app { display: none; }
  #app.visible { display: block; }

  header {
    padding: 20px 24px 0;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--amber), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header .meta { font-size: 13px; color: var(--text-dim); font-family: var(--mono); }

  /* ---- KPI Cards ---- */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; padding: 16px 24px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .kpi-card:hover { border-color: var(--text-muted); transform: translateY(-1px); }
  .kpi-card.active { border-color: var(--blue); background: var(--surface2); }
  .kpi-card.active::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--blue);
  }
  .kpi-card .kpi-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-dim); font-weight: 500; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .kpi-card .kpi-value {
    font-size: 28px; font-weight: 700; font-family: var(--mono);
    line-height: 1.1;
  }
  .kpi-card .kpi-sub {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
    font-family: var(--mono);
  }
  .kpi-card[data-filter="new_application"] .kpi-value { color: var(--green); }
  .kpi-card[data-filter="approved"] .kpi-value { color: var(--amber); }
  .kpi-card[data-filter="pending"] .kpi-value { color: var(--amber); }
  .kpi-card[data-filter="delinquent"] .kpi-value { color: var(--red); }
  .kpi-card[data-filter="rt_match"] .kpi-value { color: var(--blue); }

  /* ---- Diff Panel ---- */
  .diff-panel {
    margin: 0 24px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .diff-panel.hidden { display: none; }
  .diff-header {
    padding: 10px 16px; cursor: pointer; display: flex;
    align-items: center; gap: 8px; font-weight: 500;
    font-size: 14px;
  }
  .diff-header .badge {
    background: var(--amber); color: #000; padding: 2px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 600;
    font-family: var(--mono);
  }
  .diff-body { padding: 0 16px 12px; font-size: 13px; display: none; }
  .diff-body.open { display: block; }
  .diff-item {
    padding: 4px 0; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: baseline;
  }
  .diff-item:last-child { border-bottom: none; }
  .diff-tag {
    font-size: 10px; text-transform: uppercase; font-weight: 600;
    padding: 1px 6px; border-radius: 4px; font-family: var(--mono);
  }
  .diff-tag.new { background: rgba(34,197,94,0.2); color: var(--green); }
  .diff-tag.removed { background: rgba(239,68,68,0.2); color: var(--red); }
  .diff-tag.changed { background: rgba(245,166,35,0.2); color: var(--amber); }

  /* ---- Chart Section ---- */
  .chart-section {
    margin: 0 24px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px;
  }
  .chart-section h2 {
    font-size: 14px; font-weight: 600; margin-bottom: 12px;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .chart-wrap { position: relative; height: 280px; }

  /* ---- Filter Bar ---- */
  .filter-bar {
    display: flex; gap: 8px; padding: 0 24px 12px; flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar input, .filter-bar select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: var(--radius);
    font-family: var(--font); font-size: 13px; outline: none;
  }
  .filter-bar input { flex: 1; min-width: 180px; }
  .filter-bar select { min-width: 140px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--blue); }
  .btn-reset {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 14px; border-radius: var(--radius);
    font-family: var(--font); font-size: 13px; cursor: pointer;
  }
  .btn-reset:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-newsworthy {
    background: rgba(245,166,35,0.15); border: 1px solid var(--amber);
    color: var(--amber); padding: 8px 14px; border-radius: 20px;
    font-family: var(--font); font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn-newsworthy.active { background: var(--amber); color: #000; }

  /* ---- Map ---- */
  .map-section { margin: 0 24px 16px; position: relative; }
  #map {
    height: 500px; border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  /* Improve tile contrast */
  .leaflet-tile-pane { filter: brightness(1.45) contrast(1.15) saturate(1.3); }
  .leaflet-control-zoom a {
    background: var(--surface) !important; color: var(--text) !important;
    border-color: var(--border) !important;
  }

  /* Donut cluster styles */
  .donut-cluster {
    background: none !important; border: none !important;
    display: flex; align-items: center; justify-content: center;
  }

  /* Legend */
  .map-legend {
    position: absolute; bottom: 16px; right: 16px; z-index: 600;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 12px;
  }
  .map-legend h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ---- License List ---- */
  .list-section {
    margin: 0 24px 24px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .list-header {
    padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
  }
  .list-header h2 {
    font-size: 14px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .list-header .count {
    font-family: var(--mono); font-size: 13px; color: var(--text-muted);
  }
  .list-table-wrap { overflow-x: auto; }
  .list-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .list-table thead th {
    padding: 8px 12px; text-align: left; font-weight: 500;
    color: var(--text-dim); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    cursor: pointer; white-space: nowrap; user-select: none;
    position: sticky; top: 0; background: var(--surface);
  }
  .list-table thead th:hover { color: var(--text); }
  .list-table thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  .list-table thead th.sorted .sort-arrow { opacity: 1; color: var(--blue); }
  .list-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .list-table tbody tr:hover { background: var(--surface2); }
  .list-table tbody td {
    padding: 8px 12px; white-space: nowrap; max-width: 240px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .list-table .name-link {
    color: var(--blue); cursor: pointer; text-decoration: none;
  }
  .list-table .name-link:hover { text-decoration: underline; }
  .list-table .cat-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; text-transform: uppercase; font-weight: 600;
    font-family: var(--mono); letter-spacing: 0.3px;
  }
  .cat-new { background: rgba(34,197,94,0.15); color: var(--green); }
  .cat-renewal { background: rgba(107,114,128,0.2); color: var(--gray); }
  .cat-active { background: rgba(59,130,246,0.15); color: var(--blue); }
  .cat-pending { background: rgba(245,166,35,0.15); color: var(--amber); }
  .cat-delinquent { background: rgba(239,68,68,0.15); color: var(--red); }
  .cat-closed { background: rgba(55,65,81,0.3); color: var(--text-muted); }

  .rt-badge {
    display: inline-flex; align-items: center; gap: 3px;
    color: var(--blue); font-size: 13px; cursor: help;
  }

  /* Pagination */
  .list-pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border);
  }
  .list-pagination button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 12px; border-radius: 6px;
    font-family: var(--font); font-size: 12px; cursor: pointer;
  }
  .list-pagination button:hover { border-color: var(--text-muted); color: var(--text); }
  .list-pagination button:disabled { opacity: 0.3; cursor: default; }
  .list-pagination .page-info { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }

  /* ---- Detail Modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 8000;
    background: rgba(0,0,0,0.7); display: none;
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); max-width: 560px; width: 100%;
    max-height: 80vh; overflow-y: auto; position: relative;
  }
  .modal-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px; }
  .modal-body h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 4px;
    padding-right: 32px;
  }
  .modal-body .modal-dba { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
  .modal-section {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
  }
  .modal-section h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-dim); margin-bottom: 8px; font-weight: 500;
  }
  .modal-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .modal-field label {
    display: block; font-size: 10px; text-transform: uppercase;
    color: var(--text-muted); letter-spacing: 0.3px; margin-bottom: 2px;
  }
  .modal-field span {
    font-size: 14px; font-family: var(--mono); color: var(--text);
  }
  .modal-field a {
    color: var(--blue); text-decoration: none; font-size: 13px;
  }
  .modal-field a:hover { text-decoration: underline; }
  .modal-rt {
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
    border-radius: 8px; padding: 12px; margin-top: 14px;
  }
  .modal-rt h3 { color: var(--blue); margin-bottom: 8px; }
  .modal-links { display: flex; gap: 10px; margin-top: 12px; }
  .modal-links a {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--blue); font-size: 13px; text-decoration: none;
  }
  .modal-links a:hover { text-decoration: underline; }

  /* ---- Scrollbar ---- */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ---- Leaflet popup ---- */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; color: var(--text) !important;
    border-radius: var(--radius) !important; border: 1px solid var(--border);
    font-family: var(--font) !important; font-size: 13px;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 10px 14px !important; }
</style>
</head>
<body>

<!-- Auth Overlay -->
<div id="auth-overlay">
  <h1>🍸 Liquor License Tracker</h1>
  <input type="password" id="auth-pw" placeholder="Password" autofocus>
  <div class="error" id="auth-error"></div>
  <button onclick="checkAuth()">Enter</button>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>🍸 Liquor License Tracker</h1>
    <span class="meta" id="meta-info"></span>
  </header>

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Diff Panel -->
  <div class="diff-panel hidden" id="diff-panel">
    <div class="diff-header" onclick="toggleDiff()">
      <span>⚡ What's Changed</span>
      <span class="badge" id="diff-badge">0</span>
    </div>
    <div class="diff-body" id="diff-body"></div>
  </div>

  <!-- Chart -->
  <div class="chart-section">
    <h2>New Licenses & Delinquencies — <span id="chart-year"></span></h2>
    <div class="chart-wrap">
      <canvas id="main-chart"></canvas>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <input type="text" id="f-search" placeholder="Search name, address, license type...">
    <select id="f-status"><option value="">All Statuses</option></select>
    <select id="f-city"><option value="">All Cities</option></select>
    <select id="f-neighborhood"><option value="">All Neighborhoods</option></select>
    <button class="btn-newsworthy" id="btn-newsworthy" onclick="toggleNewsworthy()">Newsworthy</button>
    <button class="btn-reset" onclick="resetFilters()">Reset</button>
  </div>

  <!-- Map -->
  <div class="map-section">
    <div id="map"></div>
    <div class="map-legend">
      <h4>License Category</h4>
      <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> New Application</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f5a623"></span> Pending</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Delinquent</div>
      <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Active</div>
      <div class="legend-item"><span class="legend-dot" style="background:#6b7280"></span> Renewal</div>
      <div class="legend-item"><span class="legend-dot" style="background:#374151"></span> Closed</div>
      <div class="legend-item" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
        <span class="legend-dot" style="border:2px solid #3b82f6;background:transparent"></span> RT Match
      </div>
    </div>
  </div>

  <!-- License List -->
  <div class="list-section">
    <div class="list-header">
      <h2>License Records</h2>
      <span class="count" id="list-count">0 records</span>
    </div>
    <div class="list-table-wrap" style="max-height:500px;overflow-y:auto;">
      <table class="list-table">
        <thead id="list-thead"></thead>
        <tbody id="list-tbody"></tbody>
      </table>
    </div>
    <div class="list-pagination" id="list-pagination"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ===== AUTH =====
const AUTH_PW = 'BizDenScoops!';
const AUTH_KEY = 'liquor_tracker_auth';

function checkAuth() {
  const pw = document.getElementById('auth-pw').value;
  if (pw === AUTH_PW) {
    localStorage.setItem(AUTH_KEY, Date.now().toString());
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('auth-error').textContent = 'Incorrect password';
  }
}

document.getElementById('auth-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAuth();
});

// Check stored auth (30-day session)
(function() {
  const stored = localStorage.getItem(AUTH_KEY);
  if (stored && Date.now() - parseInt(stored) < 30 * 24 * 60 * 60 * 1000) {
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    setTimeout(initApp, 50);
  }
})();

// ===== GLOBALS =====
let DATA = null;
let filteredRecords = [];
let activeKPI = null;
let newsworthyActive = false;
let sortCol = null;
let sortAsc = true;
let listPage = 0;
const PAGE_SIZE = 100;
let map, clusterGroup;

const CATEGORY_COLORS = {
  new_application: '#22c55e',
  pending: '#f5a623',
  delinquent: '#ef4444',
  active: '#3b82f6',
  renewal: '#6b7280',
  closed: '#374151',
  unknown: '#374151'
};

const CATEGORY_LABELS = {
  new_application: 'New',
  pending: 'Pending',
  delinquent: 'Delinquent',
  active: 'Active',
  renewal: 'Renewal',
  closed: 'Closed',
  unknown: 'Unknown'
};

const NEWSWORTHY_CATEGORIES = ['new_application', 'pending', 'delinquent'];

// ===== INIT =====
async function initApp() {
  try {
    const resp = await fetch('liquor-data.json');
    DATA = await resp.json();
  } catch (e) {
    console.error('Failed to load data:', e);
    return;
  }

  document.getElementById('meta-info').textContent =
    `${DATA.metadata.total_records.toLocaleString()} records • Updated ${new Date(DATA.metadata.generated).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}`;

  buildKPIs();
  buildDiffPanel();
  buildChart();
  populateFilters();
  initMap();
  applyFilters();

  // Filter event listeners
  document.getElementById('f-search').addEventListener('input', debounce(applyFilters, 200));
  document.getElementById('f-status').addEventListener('change', applyFilters);
  document.getElementById('f-city').addEventListener('change', applyFilters);
  document.getElementById('f-neighborhood').addEventListener('change', applyFilters);
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ===== KPI CARDS =====
function buildKPIs() {
  const records = DATA.records;
  const now = new Date();
  const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);

  const total = records.length;
  const newApps = records.filter(r => r.category === 'new_application').length;
  const approved30 = records.filter(r => {
    if (r.source !== 'state_approved') return false;
    if (!r.issue_date) return true;
    return new Date(r.issue_date) >= thirtyDaysAgo;
  }).length;
  const pending = records.filter(r => r.category === 'pending').length;
  const delinquent = records.filter(r => r.category === 'delinquent').length;
  const rtMatches = records.filter(r => r.rt_match).length;

  const kpis = [
    { label: 'Total Records', value: total, filter: 'all', sub: '' },
    { label: 'New Applications', value: newApps, filter: 'new_application', sub: 'Last 12 months' },
    { label: 'Recently Approved', value: approved30, filter: 'approved', sub: 'Last 30 days' },
    { label: 'Pending', value: pending, filter: 'pending', sub: 'In progress' },
    { label: 'Delinquent', value: delinquent, filter: 'delinquent', sub: 'Behind on fees' },

function populateFilters() {
  const statuses = [...new Set(DATA.records.map(r => r.status).filter(Boolean))].sort();
  const cities = [...new Set(DATA.records.map(r => r.city).filter(Boolean))].sort();
  const neighborhoods = [...new Set(DATA.records.map(r => r.neighborhood).filter(Boolean))].sort();

  const fStatus = document.getElementById('f-status');
  statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; fStatus.appendChild(o); });

  const fCity = document.getElementById('f-city');
  cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; fCity.appendChild(o); });

  const fNeighborhood = document.getElementById('f-neighborhood');
  neighborhoods.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; fNeighborhood.appendChild(o); });
}

// ===== FILTER LOGIC =====
function applyFilters() {
  const search = (document.getElementById('f-search').value || '').toLowerCase();
  const status = document.getElementById('f-status').value;
  const city = document.getElementById('f-city').value;
  const neighborhood = document.getElementById('f-neighborhood').value;

  const now = new Date();
  const thirtyDaysAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);

  filteredRecords = DATA.records.filter(r => {
    // KPI filter
    if (activeKPI && activeKPI !== 'all') {
      if (activeKPI === 'approved') {
        if (r.source !== 'state_approved') return false;
        if (r.issue_date && new Date(r.issue_date) < thirtyDaysAgo) return false;
      } else if (activeKPI === 'rt_match') {
        if (!r.rt_match) return false;
      } else {
        if (r.category !== activeKPI) return false;
      }
    }

    // Newsworthy filter
    if (newsworthyActive) {
      if (!NEWSWORTHY_CATEGORIES.includes(r.category) && r.source !== 'state_approved') return false;
    }

    // Text search
    if (search) {
      const haystack = `${r.name} ${r.dba} ${r.address} ${r.license_type} ${r.neighborhood}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }

    // Dropdowns
    if (status && r.status !== status) return false;
    if (city && r.city !== city) return false;
    if (neighborhood && r.neighborhood !== neighborhood) return false;

    return true;
  });

  updateMap();
  renderList();
}

function toggleNewsworthy() {
  newsworthyActive = !newsworthyActive;
  document.getElementById('btn-newsworthy').classList.toggle('active', newsworthyActive);
  applyFilters();
}

function resetFilters() {
  activeKPI = null;
  newsworthyActive = false;
  document.getElementById('f-search').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-city').value = '';
  document.getElementById('f-neighborhood').value = '';
  document.getElementById('btn-newsworthy').classList.remove('active');
  document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('active'));
  applyFilters();
}

// ===== MAP =====
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([39.74, -104.99], 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    iconCreateFunction: createDonutIcon,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
  });
  map.addLayer(clusterGroup);
}

function createDonutIcon(cluster) {
  const children = cluster.getAllChildMarkers();
  const total = children.length;

  // Count by category
  const counts = {};
  children.forEach(m => {
    const cat = m.options.category || 'unknown';
    counts[cat] = (counts[cat] || 0) + 1;
  });

  // Size based on count
  const size = Math.min(36 + Math.sqrt(total) * 6, 72);
  const r = size / 2;
  const outerR = r * 0.85;
  const innerR = r * 0.52;

  // Build donut arcs
  let arcs = '';
  let startAngle = -Math.PI / 2;
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  for (const [cat, count] of entries) {
    const angle = (count / total) * 2 * Math.PI;
    const endAngle = startAngle + angle;

    if (angle >= 2 * Math.PI - 0.001) {
      // Full circle
      arcs += `<circle cx="${r}" cy="${r}" r="${(outerR + innerR) / 2}" fill="none" stroke="${CATEGORY_COLORS[cat] || '#374151'}" stroke-width="${outerR - innerR}"/>`;
    } else {
      const x1 = r + outerR * Math.cos(startAngle);
      const y1 = r + outerR * Math.sin(startAngle);
      const x2 = r + outerR * Math.cos(endAngle);
      const y2 = r + outerR * Math.sin(endAngle);
      const x3 = r + innerR * Math.cos(endAngle);
      const y3 = r + innerR * Math.sin(endAngle);
      const x4 = r + innerR * Math.cos(startAngle);
      const y4 = r + innerR * Math.sin(startAngle);
      const largeArc = angle > Math.PI ? 1 : 0;

      arcs += `<path d="M${x1},${y1} A${outerR},${outerR} 0 ${largeArc},1 ${x2},${y2} L${x3},${y3} A${innerR},${innerR} 0 ${largeArc},0 ${x4},${y4} Z" fill="${CATEGORY_COLORS[cat] || '#374151'}"/>`;
    }
    startAngle = endAngle;
  }

  const svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    ${arcs}
    <circle cx="${r}" cy="${r}" r="${innerR - 1}" fill="#0d0e12"/>
    <text x="${r}" y="${r}" text-anchor="middle" dy="0.35em" fill="#e2e4e9" font-family="'JetBrains Mono',monospace" font-size="${size < 44 ? 10 : 13}" font-weight="600">${total}</text>
  </svg>`;

  return L.divIcon({
    html: svg,
    className: 'donut-cluster',
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

function createMarkerIcon(record) {
  const cat = record.category || 'unknown';
  const color = CATEGORY_COLORS[cat] || '#374151';
  const hasRT = !!record.rt_match;
  const size = 14;

  let svg = `<svg width="${size + 6}" height="${size + 6}" viewBox="0 0 ${size + 6} ${size + 6}" xmlns="http://www.w3.org/2000/svg">`;
  if (hasRT) {
    svg += `<circle cx="${(size+6)/2}" cy="${(size+6)/2}" r="${size/2 + 2}" fill="none" stroke="#3b82f6" stroke-width="2"/>`;
  }
  svg += `<circle cx="${(size+6)/2}" cy="${(size+6)/2}" r="${size/2 - 1}" fill="${color}" opacity="0.9"/>`;
  svg += `</svg>`;

  return L.divIcon({
    html: svg,
    className: 'donut-cluster',
    iconSize: [size + 6, size + 6],
    iconAnchor: [(size + 6) / 2, (size + 6) / 2],
  });
}

function updateMap() {
  if (!clusterGroup) return;
  clusterGroup.clearLayers();

  const markers = [];
  for (const rec of filteredRecords) {
    if (!rec.lat || !rec.lng) continue;
    const marker = L.marker([rec.lat, rec.lng], {
      icon: createMarkerIcon(rec),
      category: rec.category || 'unknown',
    });

    // Popup
    let popupHtml = `<div style="min-width:200px">`;
    popupHtml += `<div style="font-weight:600;font-size:14px;margin-bottom:4px">${esc(rec.name || rec.dba)}</div>`;
    if (rec.dba && rec.name && rec.dba !== rec.name) {
      popupHtml += `<div style="color:#8b8f9a;font-size:12px;margin-bottom:6px">DBA: ${esc(rec.dba)}</div>`;
    }
    popupHtml += `<div style="font-size:12px;margin-bottom:2px">${esc(rec.address)}, ${esc(rec.city)}</div>`;
    popupHtml += `<div style="font-size:12px;margin-bottom:6px">${esc(rec.license_type)} • <span style="color:${CATEGORY_COLORS[rec.category]}">${CATEGORY_LABELS[rec.category] || rec.category}</span></div>`;
    if (rec.status) popupHtml += `<div style="font-size:11px;color:#8b8f9a">Status: ${esc(rec.status)}</div>`;
    if (rec.issue_date) popupHtml += `<div style="font-size:11px;color:#8b8f9a">Issued: ${rec.issue_date}</div>`;

    // Links
    const gMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(rec.address + ', ' + rec.city + ', CO')}`;
    const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${rec.lat},${rec.lng}`;
    popupHtml += `<div style="margin-top:6px;display:flex;gap:10px">`;
    popupHtml += `<a href="${gMapsUrl}" target="_blank" style="color:#3b82f6;font-size:11px;text-decoration:none">📍 Google Maps</a>`;
    popupHtml += `<a href="${svUrl}" target="_blank" style="color:#3b82f6;font-size:11px;text-decoration:none">🔭 Street View</a>`;
    popupHtml += `</div>`;

    if (rec.rt_match) {
      popupHtml += `<div style="margin-top:8px;padding:6px 8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:6px;font-size:11px">`;
      popupHtml += `<div style="color:#3b82f6;font-weight:600;margin-bottom:2px">✦ Restaurant Tracker</div>`;
      popupHtml += `<div>${esc(rec.rt_match.name)} • ${rec.rt_match.rating || '—'}★ (${rec.rt_match.reviews || 0} reviews)</div>`;
      popupHtml += `<div style="color:#8b8f9a">${esc(rec.rt_match.type || '')} • ${esc(rec.rt_match.status || '')}</div>`;
      popupHtml += `</div>`;
    }
    popupHtml += `</div>`;

    marker.bindPopup(popupHtml, { maxWidth: 320 });
    markers.push(marker);
  }

  clusterGroup.addLayers(markers);
}

// ===== LICENSE LIST =====
function renderList() {
  const count = filteredRecords.length;
  document.getElementById('list-count').textContent = `${count.toLocaleString()} records`;

  // Sort
  let sorted = [...filteredRecords];
  if (sortCol !== null) {
    sorted.sort((a, b) => {
      let va = getCellValue(a, sortCol);
      let vb = getCellValue(b, sortCol);
      if (va == null) va = '';
      if (vb == null) vb = '';
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  // Pagination
  const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
  if (listPage >= totalPages) listPage = Math.max(0, totalPages - 1);
  const start = listPage * PAGE_SIZE;
  const pageRecords = sorted.slice(start, start + PAGE_SIZE);

  // Header
  const cols = [
    { key: 'name', label: 'Business Name' },
    { key: 'category', label: 'Category' },
    { key: 'license_type', label: 'License Type' },
    { key: 'status', label: 'Status' },
    { key: 'address', label: 'Address' },
    { key: 'city', label: 'City' },
    { key: 'neighborhood', label: 'Neighborhood' },
    { key: 'issue_date', label: 'Issued' },
    { key: 'rt_match', label: 'RT' },
  ];

  document.getElementById('list-thead').innerHTML = '<tr>' + cols.map((c, i) => {
    const isSorted = sortCol === c.key;
    const arrow = isSorted ? (sortAsc ? '▲' : '▼') : '▲';
    return `<th class="${isSorted ? 'sorted' : ''}" onclick="sortList('${c.key}')">${c.label} <span class="sort-arrow">${arrow}</span></th>`;
  }).join('') + '</tr>';

  // Body
  const tbody = document.getElementById('list-tbody');
  tbody.innerHTML = pageRecords.map(r => {
    const catClass = `cat-${r.category === 'new_application' ? 'new' : r.category || 'unknown'}`;
    const catLabel = CATEGORY_LABELS[r.category] || r.category || '—';
    const rtCell = r.rt_match ? `<span class="rt-badge" title="${esc(r.rt_match.name)} • ${r.rt_match.rating||'—'}★">✦</span>` : '';
    const addrUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.address + ', ' + r.city + ', CO')}`;
    return `<tr>
      <td><a class="name-link" onclick="openDetail('${esc(r.id)}')">${esc(r.name || r.dba || '—')}</a></td>
      <td><span class="cat-badge ${catClass}">${catLabel}</span></td>
      <td>${esc(r.license_type || '—')}</td>
      <td>${esc(r.status || '—')}</td>
      <td><a href="${addrUrl}" target="_blank" style="color:var(--text);text-decoration:none" title="Open in Google Maps">${esc(r.address || '—')}</a></td>
      <td>${esc(r.city || '—')}</td>
      <td>${esc(r.neighborhood || '—')}</td>
      <td style="font-family:var(--mono);font-size:12px">${r.issue_date || '—'}</td>
      <td>${rtCell}</td>
    </tr>`;
  }).join('');

  // Pagination controls
  const pagDiv = document.getElementById('list-pagination');
  if (totalPages <= 1) {
    pagDiv.innerHTML = '';
    return;
  }
  pagDiv.innerHTML = `
    <button ${listPage === 0 ? 'disabled' : ''} onclick="listPage=0;renderList()">«</button>
    <button ${listPage === 0 ? 'disabled' : ''} onclick="listPage--;renderList()">‹</button>
    <span class="page-info">${listPage + 1} / ${totalPages}</span>
    <button ${listPage >= totalPages - 1 ? 'disabled' : ''} onclick="listPage++;renderList()">›</button>
    <button ${listPage >= totalPages - 1 ? 'disabled' : ''} onclick="listPage=${totalPages-1};renderList()">»</button>
  `;
}

function getCellValue(rec, key) {
  if (key === 'rt_match') return rec.rt_match ? 1 : 0;
  return rec[key];
}

function sortList(col) {
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = true;
  }
  listPage = 0;
  renderList();
}

// ===== DETAIL MODAL =====
function openDetail(id) {
  const rec = DATA.records.find(r => r.id === id);
  if (!rec) return;

  const catClass = `cat-${rec.category === 'new_application' ? 'new' : rec.category || 'unknown'}`;
  const catLabel = CATEGORY_LABELS[rec.category] || rec.category || '—';
  const gMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(rec.address + ', ' + rec.city + ', CO')}`;
  const svUrl = rec.lat && rec.lng ? `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${rec.lat},${rec.lng}` : null;

  let html = `<h2>${esc(rec.name || '—')}</h2>`;
  if (rec.dba && rec.dba !== rec.name) html += `<div class="modal-dba">DBA: ${esc(rec.dba)}</div>`;
  html += `<span class="cat-badge ${catClass}" style="margin-bottom:8px;display:inline-block">${catLabel}</span>`;

  // License details
  html += `<div class="modal-section"><h3>License Details</h3><div class="modal-grid">`;
  html += field('Type', rec.license_type);
  html += field('Number', rec.license_number);
  html += field('Status', rec.status);
  html += field('Source', rec.source === 'denver' ? 'Denver ArcGIS' : rec.source === 'state_approved' ? 'State (Approved)' : 'State (Active)');
  html += `</div></div>`;

  // Location
  html += `<div class="modal-section"><h3>Location</h3><div class="modal-grid">`;
  html += field('Address', rec.address);
  html += field('City', `${rec.city}, ${rec.state} ${rec.zip}`);
  if (rec.neighborhood) html += field('Neighborhood', rec.neighborhood);
  if (rec.council_district) html += field('Council Dist.', rec.council_district);
  html += `</div>`;
  html += `<div class="modal-links">`;
  html += `<a href="${gMapsUrl}" target="_blank">📍 Google Maps</a>`;
  if (svUrl) html += `<a href="${svUrl}" target="_blank">🔭 Street View</a>`;
  html += `</div></div>`;

  // Dates
  html += `<div class="modal-section"><h3>Dates</h3><div class="modal-grid">`;
  html += field('Issued', rec.issue_date || '—');
  html += field('Expires', rec.expiration_date || '—');
  if (rec.hearing_date) html += field('Hearing', rec.hearing_date);
  if (rec.hearing_time) html += field('Hearing Time', rec.hearing_time);
  if (rec.hearing_status) html += field('Hearing Status', rec.hearing_status);
  html += `</div></div>`;

  // RT Match
  if (rec.rt_match) {
    const rt = rec.rt_match;
    html += `<div class="modal-rt"><h3>✦ Restaurant Tracker Match</h3><div class="modal-grid">`;
    html += field('Name', rt.name);
    html += field('Rating', rt.rating ? `${rt.rating}★ (${rt.reviews || 0})` : '—');
    html += field('Type', rt.type || '—');
    html += field('Status', rt.status || '—');
    if (rt.first_seen) html += field('First Seen', rt.first_seen);
    html += `</div></div>`;
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function field(label, value) {
  return `<div class="modal-field"><label>${label}</label><span>${esc(String(value || '—'))}</span></div>`;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== UTIL =====
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
